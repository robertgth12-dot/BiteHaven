<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Bite Haven</title>
  <link rel="stylesheet" href="style.css">
  </head>
<body>

  <header>
    <h1 class="logo">
      <img src="Img/logo.png" alt="Logo" class="logo-img"> Bite Haven
    </h1>
    <nav>
      <a href="#">Home</a>
      <a href="#menu">Menu</a>
      <a href="#contact">Contact</a>
    </nav>
  </header>

  <section class="hero">
    <div class="hero-content">
      <h1>The place where there is foodie</h1>
      <p class="herop">Delicious Burgers, Pizza & Fresh Pasta</p>
      <button>Order Now</button>
    </div>
  </section>

  <section class="menu" id="menu">
    <h2>Our Menu</h2>

    <div class="food-container">

      <div class="food-card">
        <img src="Img/burger.jfif" alt="Burger">
        <h3>Classic Burger</h3>
        <p>Juicy grilled beef burger</p>
        <span>$8</span>
        <button class="order-btn">Order Now</button>
      </div>

      <div class="food-card">
        <img src="Img/pizza.jfif" alt="Pizza">
        <h3>Pepperoni Pizza</h3>
        <p>Cheesy pepperoni pizza</p>
        <span>$12</span>
        <button class="order-btn">Order Now</button>
      </div>

      <div class="food-card">
        <img src="Img/pasta.jfif" alt="Pasta">
        <h3>Creamy Pasta</h3>
        <p>Creamy Italian pasta</p>
        <span>$10</span>
        <button class="order-btn">Order Now</button>
      </div>

    </div>
  </section>

  <footer>
    <p>© 2026 Bite Haven. All rights reserved.</p>
  </footer>

</body>
</html>
